<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spice Garden — Authentic Indian Cuisine</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #e85d04;
      --primary-dark:  #c74f03;
      --secondary:     #f48c06;
      --accent:        #dc2f02;
      --bg:            #fff8f0;
      --surface:       #ffffff;
      --text:          #2d1b0e;
      --text-muted:    #7a6552;
      --border:        #f0d9c8;
      --radius:        16px;
      --radius-sm:     8px;
      --shadow-sm:     0 2px 8px rgba(232,93,4,.08);
      --shadow:        0 4px 20px rgba(232,93,4,.12);
      --shadow-lg:     0 8px 40px rgba(232,93,4,.2);
    }

    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

    /* ── Header ───────────────────────────────── */
    header {
      background: linear-gradient(135deg, #7b0d00 0%, #e85d04 55%, #f48c06 100%);
      color: #fff;
      padding: 1.1rem 2rem;
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 4px 20px rgba(0,0,0,.25);
    }
    .brand { display: flex; align-items: center; gap: .75rem; }
    .brand-logo { font-size: 2rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,.3)); }
    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem; letter-spacing: -.02em;
      text-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    .brand-tagline { font-size: .7rem; opacity: .82; letter-spacing: .1em; text-transform: uppercase; }
    .cart-btn {
      background: rgba(255,255,255,.18);
      border: 2px solid rgba(255,255,255,.35);
      color: #fff; padding: .55rem 1.1rem;
      border-radius: 50px; cursor: pointer;
      font-size: .9rem; font-weight: 600;
      display: flex; align-items: center; gap: .5rem;
      transition: all .2s; backdrop-filter: blur(6px);
      font-family: 'Inter', sans-serif;
    }
    .cart-btn:hover { background: rgba(255,255,255,.3); transform: scale(1.04); }
    .cart-badge {
      background: #fff; color: var(--primary);
      border-radius: 50%; width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem; font-weight: 700;
      transition: transform .2s;
    }
    .cart-badge.bump { transform: scale(1.4); }

    /* ── Category Nav ─────────────────────────── */
    .cat-nav {
      background: #fff;
      padding: .85rem 2rem;
      display: flex; gap: .65rem;
      overflow-x: auto;
      border-bottom: 2px solid var(--border);
      position: sticky; top: 68px; z-index: 90;
    }
    .cat-nav::-webkit-scrollbar { display: none; }
    .cat-btn {
      padding: .45rem 1.15rem; border-radius: 50px;
      border: 2px solid var(--border);
      background: transparent; color: var(--text-muted);
      cursor: pointer; font-size: .85rem; font-weight: 500;
      white-space: nowrap; transition: all .2s;
      font-family: 'Inter', sans-serif;
    }
    .cat-btn:hover { border-color: var(--primary); color: var(--primary); }
    .cat-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

    /* ── Menu ─────────────────────────────────── */
    .menu-container { padding: 2rem; max-width: 1200px; margin: 0 auto; }

    .section-heading {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem; color: var(--text);
      margin-bottom: 1.2rem;
      display: flex; align-items: center; gap: .6rem;
    }
    .section-heading::after {
      content: ''; flex: 1; height: 2px;
      background: linear-gradient(90deg, var(--primary), transparent);
      margin-left: .5rem;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(268px, 1fr));
      gap: 1.4rem; margin-bottom: 2.5rem;
    }

    .menu-card {
      background: var(--surface); border-radius: var(--radius);
      overflow: hidden; border: 1px solid var(--border);
      box-shadow: var(--shadow-sm); transition: all .25s;
    }
    .menu-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }

    .card-img {
      height: 145px;
      display: flex; align-items: center; justify-content: center;
      font-size: 3.8rem; position: relative;
    }
    .card-img .veg-badge {
      position: absolute; top: 10px; right: 10px;
      width: 20px; height: 20px;
      border: 2px solid;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: .55rem; font-weight: 700;
    }
    .veg   .veg-badge { border-color: #16a34a; color: #16a34a; background: rgba(22,163,74,.08); }
    .nonveg .veg-badge { border-color: #dc2626; color: #dc2626; background: rgba(220,38,38,.08); }

    .card-body { padding: 1rem 1.2rem 1.2rem; }
    .card-name { font-weight: 600; font-size: .98rem; margin-bottom: .3rem; }
    .card-desc { font-size: .78rem; color: var(--text-muted); line-height: 1.55; margin-bottom: .8rem; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .card-price { font-size: 1.1rem; font-weight: 700; color: var(--primary); }

    .add-btn {
      background: var(--primary); color: #fff;
      border: none; border-radius: 50px;
      padding: .42rem 1rem; font-size: .82rem; font-weight: 600;
      cursor: pointer; transition: all .2s;
      font-family: 'Inter', sans-serif;
    }
    .add-btn:hover { background: var(--primary-dark); transform: scale(1.06); }
    .add-btn.added { background: #16a34a; }

    /* ── Cart Drawer ──────────────────────────── */
    .backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.52); z-index: 200;
      opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .backdrop.show { opacity: 1; pointer-events: all; }

    .cart-drawer {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 390px; max-width: 100vw;
      background: #fff; z-index: 300;
      transform: translateX(100%);
      transition: transform .32s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column;
      box-shadow: -10px 0 50px rgba(0,0,0,.18);
    }
    .cart-drawer.open { transform: translateX(0); }

    .cart-head {
      padding: 1.25rem 1.5rem;
      background: var(--bg); border-bottom: 2px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .cart-head h2 { font-family: 'Playfair Display', serif; font-size: 1.3rem; }
    .close-btn {
      background: none; border: none;
      font-size: 1.4rem; cursor: pointer;
      color: var(--text-muted); width: 36px; height: 36px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }
    .close-btn:hover { background: var(--border); color: var(--text); }

    .cart-list { flex: 1; overflow-y: auto; padding: 1rem; }
    .cart-list::-webkit-scrollbar { width: 4px; }
    .cart-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .cart-empty {
      text-align: center; padding: 3rem 1rem; color: var(--text-muted);
    }
    .cart-empty-icon { font-size: 3.5rem; margin-bottom: 1rem; opacity: .7; }

    .cart-item {
      display: flex; gap: .75rem; align-items: center;
      padding: .75rem; border-radius: 10px;
      background: var(--bg); margin-bottom: .6rem;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; } }
    .ci-emoji { font-size: 1.85rem; width: 42px; text-align: center; }
    .ci-info { flex: 1; min-width: 0; }
    .ci-name { font-weight: 500; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ci-price { font-size: .78rem; color: var(--text-muted); }
    .ci-ctrl { display: flex; align-items: center; gap: .45rem; }
    .qty-btn {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid var(--border); background: #fff;
      font-size: 1rem; font-weight: 700; color: var(--primary);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .qty-btn:hover { border-color: var(--primary); background: var(--primary); color: #fff; }
    .qty-val { font-weight: 700; min-width: 20px; text-align: center; font-size: .9rem; }

    .cart-foot { padding: 1.1rem 1.5rem; border-top: 2px solid var(--border); }
    .table-input {
      width: 100%; padding: .7rem 1rem;
      border: 2px solid var(--border); border-radius: var(--radius-sm);
      font-size: 1rem; font-family: 'Inter', sans-serif;
      transition: border-color .2s; margin-bottom: .9rem;
    }
    .table-input:focus { outline: none; border-color: var(--primary); }
    .table-input.error { border-color: var(--accent); animation: shake .3s ease; }
    @keyframes shake { 0%,100% { transform: translateX(0); } 33% { transform: translateX(-5px); } 66% { transform: translateX(5px); } }

    .cart-total {
      display: flex; justify-content: space-between; align-items: center;
      padding: .75rem 1rem; background: var(--bg); border-radius: var(--radius-sm);
      font-size: 1.05rem; font-weight: 600; margin-bottom: .9rem;
    }
    .cart-total span:last-child { color: var(--primary); }

    .place-btn {
      width: 100%; padding: .85rem;
      background: linear-gradient(135deg, var(--accent) 0%, var(--primary) 60%, var(--secondary) 100%);
      color: #fff; border: none; border-radius: var(--radius-sm);
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: all .2s; letter-spacing: .02em;
      font-family: 'Inter', sans-serif;
    }
    .place-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(220,47,2,.35); }
    .place-btn:disabled { opacity: .65; cursor: not-allowed; }

    /* ── Order Confirmation Modal ─────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6); z-index: 500;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      background: #fff; border-radius: var(--radius);
      padding: 2.5rem 2rem; max-width: 400px; width: 90%;
      text-align: center;
      transform: scale(.88); transition: transform .3s;
    }
    .overlay.show .modal { transform: scale(1); }
    .modal-icon { font-size: 4rem; margin-bottom: .75rem; }
    .modal h2 { font-family: 'Playfair Display', serif; font-size: 1.7rem; margin-bottom: .4rem; }
    .modal p { color: var(--text-muted); font-size: .9rem; margin-bottom: 1rem; }
    .order-badge {
      display: inline-block;
      background: var(--bg); border: 2px solid var(--primary);
      color: var(--primary); padding: .5rem 1.4rem;
      border-radius: 50px; font-weight: 700; font-size: 1.1rem;
      margin-bottom: 1.4rem;
    }
    .ok-btn {
      background: var(--primary); color: #fff; border: none;
      padding: .7rem 2rem; border-radius: 50px;
      font-size: .95rem; font-weight: 600; cursor: pointer;
      transition: background .2s; font-family: 'Inter', sans-serif;
    }
    .ok-btn:hover { background: var(--primary-dark); }

    /* ── Loading & Empty ──────────────────────── */
    .loader {
      text-align: center; padding: 4rem 1rem; color: var(--text-muted);
    }
    .loader .spin {
      width: 40px; height: 40px; margin: 0 auto 1rem;
      border: 3px solid var(--border); border-top-color: var(--primary);
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      header { padding: .9rem 1rem; }
      .brand-name { font-size: 1.4rem; }
      .cat-nav { padding: .75rem 1rem; top: 60px; }
      .menu-container { padding: 1rem; }
      .cart-drawer { width: 100vw; }
    }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────── -->
<header>
  <div class="brand">
    <div class="brand-logo">🍽️</div>
    <div>
      <div class="brand-name">Spice Garden</div>
      <div class="brand-tagline">Authentic Indian Cuisine</div>
    </div>
  </div>
  <button class="cart-btn" onclick="toggleCart()">
    🛒 Cart <span class="cart-badge" id="cart-count">0</span>
  </button>
</header>

<!-- ── Category Nav ───────────────────────────── -->
<nav class="cat-nav">
  <button class="cat-btn active" data-cat="All"         onclick="filterCat('All',this)">✨ All Items</button>
  <button class="cat-btn"        data-cat="Starters"    onclick="filterCat('Starters',this)">🥗 Starters</button>
  <button class="cat-btn"        data-cat="Main Course" onclick="filterCat('Main Course',this)">🍛 Main Course</button>
  <button class="cat-btn"        data-cat="Drinks"      onclick="filterCat('Drinks',this)">🥤 Drinks</button>
  <button class="cat-btn"        data-cat="Desserts"    onclick="filterCat('Desserts',this)">🍮 Desserts</button>
</nav>

<!-- ── Menu ───────────────────────────────────── -->
<main class="menu-container" id="menu">
  <div class="loader"><div class="spin"></div><p>Loading our menu…</p></div>
</main>

<!-- ── Backdrop ───────────────────────────────── -->
<div class="backdrop" id="backdrop" onclick="toggleCart()"></div>

<!-- ── Cart Drawer ────────────────────────────── -->
<aside class="cart-drawer" id="cart-drawer">
  <div class="cart-head">
    <h2>Your Cart 🛒</h2>
    <button class="close-btn" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-list" id="cart-list">
    <div class="cart-empty">
      <div class="cart-empty-icon">🛒</div>
      <p style="font-weight:600;margin-bottom:.4rem">Your cart is empty</p>
      <p style="font-size:.82rem">Browse the menu and add something delicious!</p>
    </div>
  </div>
  <div class="cart-foot">
    <input id="table-num" class="table-input" type="number" min="1" max="99"
           placeholder="Table number (e.g. 5)">
    <div class="cart-total">
      <span>Total</span>
      <span id="cart-total-amount">₹0.00</span>
    </div>
    <button class="place-btn" onclick="placeOrder()">Place Order →</button>
  </div>
</aside>

<!-- ── Confirmation Modal ─────────────────────── -->
<div class="overlay" id="modal">
  <div class="modal">
    <div class="modal-icon">🎉</div>
    <h2>Order Placed!</h2>
    <p>Your food is on its way to the kitchen.</p>
    <div class="order-badge" id="modal-order-id">Order #–</div>
    <p style="font-size:.8rem;margin-bottom:1.4rem">Show this number to staff if you need help.</p>
    <button class="ok-btn" onclick="closeModal()">Continue Ordering</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* ── data ──────────────────────────────────────────────────── */
const CAT_COLORS = {
  'Starters':    'linear-gradient(135deg,#ff6b35,#f7931e)',
  'Main Course': 'linear-gradient(135deg,#9d0208,#e74c3c)',
  'Drinks':      'linear-gradient(135deg,#1565c0,#42a5f5)',
  'Desserts':    'linear-gradient(135deg,#6a1b9a,#ce93d8)',
};
const CAT_ICONS = { Starters:'🥗', 'Main Course':'🍛', Drinks:'🥤', Desserts:'🍮' };
const EMOJIS = {
  'Samosa (2 pcs)':         '🫓',
  'Paneer Tikka':           '🧀',
  'Chicken Tikka':          '🍗',
  'Veg Spring Rolls (4 pcs)':'🌯',
  'Hara Bhara Kebab':       '🥬',
  'Butter Chicken':         '🍛',
  'Palak Paneer':           '🥗',
  'Dal Makhani':            '🫘',
  'Chicken Biryani':        '🍚',
  'Veg Biryani':            '🌾',
  'Shahi Paneer':           '👑',
  'Sweet Lassi':            '🥛',
  'Masala Chai':            '☕',
  'Fresh Mango Juice':      '🥭',
  'Soft Drink':             '🥤',
  'Gulab Jamun (2 pcs)':    '🍮',
  'Kulfi (Malai)':          '🍦',
  'Kheer':                  '🥣',
  'Gajar Halwa':            '🥕',
};
const VEG_ITEMS = new Set([
  'Samosa (2 pcs)','Paneer Tikka','Veg Spring Rolls (4 pcs)','Hara Bhara Kebab',
  'Palak Paneer','Dal Makhani','Veg Biryani','Shahi Paneer',
  'Sweet Lassi','Masala Chai','Fresh Mango Juice','Soft Drink',
  'Gulab Jamun (2 pcs)','Kulfi (Malai)','Kheer','Gajar Halwa',
]);

let allItems = [];
let cart = {};          // { [id]: { item, qty } }
let currentCat = 'All';

const socket = io();

/* ── fetch menu ────────────────────────────────────────────── */
async function loadMenu() {
  try {
    const res  = await fetch('/api/menu');
    const data = await res.json();
    allItems   = data.data;
    renderMenu();
  } catch {
    document.getElementById('menu').innerHTML =
      '<div class="loader"><p>⚠️ Could not load menu. Please refresh.</p></div>';
  }
}

/* ── filter + render ───────────────────────────────────────── */
function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMenu();
}

function renderMenu() {
  const wrap      = document.getElementById('menu');
  const cats      = ['Starters','Main Course','Drinks','Desserts'];
  const showCats  = currentCat === 'All' ? cats : [currentCat];

  let html = '';
  for (const cat of showCats) {
    const items = allItems.filter(i => i.category === cat);
    if (!items.length) continue;
    html += `<h2 class="section-heading">${CAT_ICONS[cat] || ''} ${cat}</h2><div class="menu-grid">`;
    for (const item of items) {
      const emoji    = EMOJIS[item.name] || '🍽️';
      const grad     = CAT_COLORS[item.category] || 'linear-gradient(135deg,#e85d04,#f48c06)';
      const isVeg    = VEG_ITEMS.has(item.name);
      const inCart   = !!cart[item.id];
      const vegClass = isVeg ? 'veg' : 'nonveg';
      const vegLabel = isVeg ? '●' : '●';
      html += `
        <div class="menu-card">
          <div class="card-img ${vegClass}" style="background:${grad}">
            ${emoji}
            <div class="veg-badge">${vegLabel}</div>
          </div>
          <div class="card-body">
            <div class="card-name">${item.name}</div>
            <div class="card-desc">${item.description || ''}</div>
            <div class="card-footer">
              <span class="card-price">₹${item.price}</span>
              <button class="add-btn${inCart ? ' added' : ''}" id="btn-${item.id}"
                onclick="addToCart(${item.id})">${inCart ? '✓ Added' : '+ Add'}</button>
            </div>
          </div>
        </div>`;
    }
    html += '</div>';
  }
  if (!html) html = '<div class="loader"><p>No items found.</p></div>';
  wrap.innerHTML = html;
}

/* ── cart operations ───────────────────────────────────────── */
function addToCart(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  if (cart[id]) cart[id].qty++;
  else          cart[id] = { item, qty: 1 };
  syncCart();
  openCart();
}

function adjustQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  syncCart();
}

function syncCart() {
  const total = Object.values(cart).reduce((s, v) => s + v.qty, 0);
  const badge = document.getElementById('cart-count');
  badge.textContent = total;
  badge.classList.add('bump');
  setTimeout(() => badge.classList.remove('bump'), 250);
  renderCartList();
  renderMenu();
}

function renderCartList() {
  const list   = document.getElementById('cart-list');
  const entries = Object.values(cart);
  if (!entries.length) {
    list.innerHTML = `
      <div class="cart-empty">
        <div class="cart-empty-icon">🛒</div>
        <p style="font-weight:600;margin-bottom:.4rem">Cart is empty</p>
        <p style="font-size:.82rem">Add items from the menu!</p>
      </div>`;
    document.getElementById('cart-total-amount').textContent = '₹0.00';
    return;
  }
  let subtotal = 0, html = '';
  for (const { item, qty } of entries) {
    const line = item.price * qty;
    subtotal  += line;
    html += `
      <div class="cart-item">
        <div class="ci-emoji">${EMOJIS[item.name] || '🍽️'}</div>
        <div class="ci-info">
          <div class="ci-name">${item.name}</div>
          <div class="ci-price">₹${item.price} each · <b>₹${line}</b></div>
        </div>
        <div class="ci-ctrl">
          <button class="qty-btn" onclick="adjustQty(${item.id},-1)">−</button>
          <span class="qty-val">${qty}</span>
          <button class="qty-btn" onclick="adjustQty(${item.id},1)">+</button>
        </div>
      </div>`;
  }
  list.innerHTML = html;
  document.getElementById('cart-total-amount').textContent = `₹${subtotal.toFixed(2)}`;
}

/* ── cart drawer ───────────────────────────────────────────── */
function openCart()   { document.getElementById('cart-drawer').classList.add('open'); document.getElementById('backdrop').classList.add('show'); }
function closeCart()  { document.getElementById('cart-drawer').classList.remove('open'); document.getElementById('backdrop').classList.remove('show'); }
function toggleCart() { document.getElementById('cart-drawer').classList.contains('open') ? closeCart() : openCart(); }

/* ── place order ───────────────────────────────────────────── */
async function placeOrder() {
  const inp   = document.getElementById('table-num');
  const table = parseInt(inp.value);
  if (!table || table < 1 || table > 99) {
    inp.classList.add('error');
    inp.focus(); inp.placeholder = '⚠ Enter a valid table number (1–99)';
    setTimeout(() => { inp.classList.remove('error'); inp.placeholder = 'Table number (e.g. 5)'; }, 2500);
    return;
  }
  const entries = Object.values(cart);
  if (!entries.length) return;

  const btn = document.querySelector('.place-btn');
  btn.disabled = true; btn.textContent = 'Placing order…';

  try {
    const res  = await fetch('/api/orders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        table_number: table,
        items: entries.map(({ item, qty }) => ({ menu_item_id: item.id, quantity: qty })),
      }),
    });
    const data = await res.json();
    if (data.success) {
      cart = {};
      syncCart();
      closeCart();
      inp.value = '';
      document.getElementById('modal-order-id').textContent = `Order #${data.data.id}`;
      document.getElementById('modal').classList.add('show');
    } else {
      alert('Could not place order: ' + data.error);
    }
  } catch {
    alert('Network error. Please try again.');
  } finally {
    btn.disabled = false; btn.textContent = 'Place Order →';
  }
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

/* ── init ──────────────────────────────────────────────────── */
loadMenu();
</script>
</body>
</html>
